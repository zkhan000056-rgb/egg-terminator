<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg Terminator: Cramp Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            user-select: none;
            text-align: center;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        header {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            backdrop-filter: blur(5px);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #play-area {
            flex-grow: 1;
            position: relative;
            cursor: crosshair;
        }

        .egg {
            position: absolute;
            font-size: 3.5rem;
            cursor: pointer;
            transition: transform 0.1s;
            animation: float 3s infinite ease-in-out;
        }

        .egg:active {
            transform: scale(0.8);
        }

        .heating-pad {
            position: absolute;
            font-size: 3rem;
            cursor: pointer;
            animation: pulse 1.5s infinite;
        }

        .splat {
            position: absolute;
            font-size: 2.5rem;
            pointer-events: none;
            animation: fadeOut 0.5s forwards;
        }

        #victory-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        button {
            background: #ff4e50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            font-weight: bold;
            margin-top: 20px;
        }

        button:hover {
            background: #f9d423;
            color: #ff4e50;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.5) translateY(-20px); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <header>
            <h1>🥚 EGG TERMINATOR 🥚</h1>
            <p style="margin: 0 0 10px 0; font-style: italic;">Smash the eggs to destroy the cramps!</p>
            <div class="stats">
                <div>Eggs Smashed: <span id="score">0</span></div>
                <div>Cramp Level: <span id="cramp-meter">100%</span></div>
            </div>
        </header>

        <div id="play-area"></div>

        <div id="victory-screen">
            <h2>🏆 YOU DESTROYED THE CRAMPS! 🏆</h2>
            <p style="font-size: 1.3rem; max-width: 80%; line-height: 1.5;">
                The monthly subscription to pain has been cancelled. Go grab some chocolate, put on a movie, and bully your partner into giving you a massage. You earned it.
            </p>
            <button onclick="resetGame()">Vent More Anger (Restart)</button>
        </div>
    </div>

    <script>
        const playArea = document.getElementById('play-area');
        const scoreDisplay = document.getElementById('score');
        const crampDisplay = document.getElementById('cramp-meter');
        const victoryScreen = document.getElementById('victory-screen');

        let score = 0;
        let crampLevel = 100;
        let gameInterval;
        let powerUpInterval;
        let spawnRate = 1000; // ms

        const eggEmojis = ['🥚', '💢', '🤬', '🌋'];

        function spawnEgg() {
            if (crampLevel <= 0) return;

            const egg = document.createElement('div');
            egg.classList.add('egg');
            
            // Pick a random angry/egg emoji
            egg.innerText = eggEmojis[Math.floor(Math.random() * eggEmojis.length)];
            
            // Random positioning
            const x = Math.random() * (playArea.clientWidth - 60);
            const y = Math.random() * (playArea.clientHeight - 60);
            egg.style.left = `${x}px`;
            egg.style.top = `${y}px`;

            // Click event to destroy egg
            egg.addEventListener('click', (e) => {
                createSplat(x, y, '💥💥');
                egg.remove();
                score++;
                crampLevel -= 4; // Takes 25 eggs to beat the game
                if (crampLevel < 0) crampLevel = 0;
                
                updateStats();
                checkWin();
            });

            // Mobile touch compatibility
            egg.addEventListener('touchstart', (e) => {
                e.preventDefault();
                egg.click();
            });

            playArea.appendChild(egg);

            // Egg disappears after 3.5 seconds if not clicked
            setTimeout(() => {
                if (egg.parentNode) {
                    egg.remove();
                }
            }, 3500);
        }

        function spawnHeatingPad() {
            if (crampLevel <= 0) return;

            const pad = document.createElement('div');
            pad.classList.add('heating-pad');
            pad.innerText = '🔥'; // Heating pad comfort
            
            const x = Math.random() * (playArea.clientWidth - 60);
            const y = Math.random() * (playArea.clientHeight - 60);
            pad.style.left = `${x}px`;
            pad.style.top = `${y}px`;

            pad.addEventListener('click', () => {
                createSplat(x, y, '✨ RELIEF ✨');
                pad.remove();
                crampLevel -= 15; // Huge relief!
                if (crampLevel < 0) crampLevel = 0;
                updateStats();
                checkWin();
            });

            playArea.appendChild(pad);

            setTimeout(() => { if (pad.parentNode) pad.remove(); }, 4000);
        }

        function createSplat(x, y, text) {
            const splat = document.createElement('div');
            splat.classList.add('splat');
            splat.innerText = text;
            splat.style.left = `${x}px`;
            splat.style.top = `${y}px`;
            playArea.appendChild(splat);
            setTimeout(() => splat.remove(), 500);
        }

        function updateStats() {
            scoreDisplay.innerText = score;
            crampDisplay.innerText = `${crampLevel}%`;
        }

        function checkWin() {
            if (crampLevel <= 0) {
                clearInterval(gameInterval);
                clearInterval(powerUpInterval);
                playArea.innerHTML = '';
                victoryScreen.style.display = 'flex';
            }
        }

        function startGame() {
            gameInterval = setInterval(spawnEgg, spawnRate);
            powerUpInterval = setInterval(spawnHeatingPad, 7000); // Heating pad every 7 secs
        }

        function resetGame() {
            score = 0;
            crampLevel = 100;
            updateStats();
            victoryScreen.style.display = 'none';
            startGame();
        }

        // Start the chaos immediately
        startGame();
    </script>
</body>
</html>
