<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg Terminator 2.0</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1d0a0a, #2d1111);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow: hidden;
            user-select: none;
            transition: background 0.5s ease;
        }

        body.frozen {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364) !important;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,100,100,0.5);
        }

        .stats-panel {
            display: flex;
            width: 80%;
            justify-content: space-around;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .egg-zone {
            position: relative;
            width: 100%;
            height: 50vh;
        }

        .target-item {
            position: absolute;
            cursor: pointer;
            font-size: 3.5rem;
            user-select: none;
            animation: float 2s infinite ease-in-out;
            transition: transform 0.1s ease;
        }

        .target-item:active {
            transform: scale(0.8);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 5, 5, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .screen.active {
            display: flex;
        }

        .win-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255, 77, 77, 0.4);
            transition: transform 0.2s;
        }

        .win-btn:hover {
            transform: scale(1.05);
        }

        #victory-text {
            font-size: 1.3rem;
            width: 80%;
            max-width: 600px;
            line-height: 1.6;
            margin: 20px 0;
            z-index: 12;
        }

        .freeze-banner {
            position: absolute;
            background: rgba(0, 150, 255, 0.8);
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
            z-index: 5;
        }

        /* Subtle Romantic Animation Styles */
        .romantic-heart {
            position: absolute;
            color: rgba(255, 105, 180, 0.6); /* Soft pink */
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 11;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) translateX(0) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) translateX(var(--drift)) scale(1.2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🥚 EGG TERMINATOR 2.0 🥚</h1>
        <p style="margin: 0; color: #aaa;">Tap to obliterate. Grab chocolate & heating pads!</p>
        
        <div class="stats-panel">
            <div>Smashed: <span id="score-val">0</span></div>
            <div>Cramp Level: <span id="cramp-val">100%</span></div>
        </div>

        <div class="egg-zone" id="egg-zone">
            <div id="freeze-banner" class="freeze-banner">❄️ CHOCOLATE TIME: CRAMPS FROZEN! ❄️</div>
        </div>
    </div>

    <!-- Victory Screen -->
    <div id="win-screen" class="screen">
        <h2 style="z-index: 12;">🏆 CRAMPS TOTALLY DESTROYED! 🏆</h2>
        <p id="victory-text"></p>
        <button class="win-btn" onclick="resetGame()" style="z-index: 12;">Vent More Anger (Restart)</button>
    </div>

    <script>
        // --- 1. Audio Setup ---
        const smashAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav');
        const powerupAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav');
        
        // Note: You can replace this URL later with your hosted custom music path!
        const winAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-84.wav');

        smashAudio.volume = 0.5;
        powerupAudio.volume = 0.6;
        winAudio.volume = 0.5;

        // --- 2. Dynamic Inside Jokes Array ---
        const victoryMessages = [
            "The subscription to pain has been successfully cancelled! Go melt into the couch, demand chocolate, and make your partner give you a foot massage immediately.",
            "Cramps defeated! Your official reward is to tell your partner 'chup rho' every time he tries to speak for the next 2 hours.",
            "Victory! You have full permission to do absolutely anything you want now. If anyone asks why? Just say 'mera mann' and walk away.",
            "Mission Accomplished. You survived the cramp apocalypse! Now go make your partner 'mar jao 1000 baar' (metaphorically, of course) until he brings you snacks.",
            "Level Cleared! The evil cramp overlords have retreated. Your official prescription is a hot water bag, a massive chocolate bar, and zero responsibilities."
        ];

        // --- 3. Game Variables ---
        let score = 0;
        let crampLevel = 100;
        let isTimeFrozen = false;
        let heartInterval; // To clear the animation loop on restart
        
        const eggZone = document.getElementById('egg-zone');
        const scoreDisplay = document.getElementById('score-val');
        const crampDisplay = document.getElementById('cramp-val');
        const winScreen = document.getElementById('win-screen');
        const victoryText = document.getElementById('victory-text');
        const freezeBanner = document.getElementById('freeze-banner');

        let spawnInterval;
        let powerupInterval;

        // --- 4. Core Game Engine Loops ---
        function startGame() {
            spawnInterval = setInterval(spawnEgg, 900);
            powerupInterval = setInterval(spawnPowerup, 6000); 
            spawnEgg(); 
        }

        function spawnEgg() {
            if (isTimeFrozen) return; 
            createItem('🥚', 'egg');
        }

        function spawnPowerup() {
            const types = ['🍫', '🔥']; 
            const randomType = types[Math.floor(Math.random() * types.length)];
            createItem(randomType, 'powerup');
        }

        function createItem(emoji, type) {
            const item = document.createElement('div');
            item.className = 'target-item';
            item.innerText = emoji;

            const x = Math.random() * (eggZone.clientWidth - 60);
            const y = Math.random() * (eggZone.clientHeight - 60);
            item.style.left = `${x}px`;
            item.style.top = `${y}px`;

            item.addEventListener('click', () => {
                if (type === 'egg') {
                    score++;
                    crampLevel = Math.max(0, crampLevel - 5);
                    try { smashAudio.cloneNode(true).play(); } catch(e){}
                } else if (type === 'powerup') {
                    crampLevel = Math.max(0, crampLevel - 15);
                    try { powerupAudio.play(); } catch(e){}
                    triggerFreezeEffect();
                }

                scoreDisplay.innerText = score;
                crampDisplay.innerText = `${crampLevel}%`;
                item.remove();

                if (crampLevel <= 0) {
                    triggerWin();
                }
            });

            eggZone.appendChild(item);

            setTimeout(() => {
                if (item.parentNode) item.remove();
            }, type === 'egg' ? 3000 : 5000);
        }

        // --- 5. Version 2.0 Freeze Logic ---
        function triggerFreezeEffect() {
            isTimeFrozen = true;
            document.body.classList.add('frozen');
            freezeBanner.style.display = 'block';

            setTimeout(() => {
                isTimeFrozen = false;
                document.body.classList.remove('frozen');
                freezeBanner.style.display = 'none';
            }, 3500);
        }

        // --- 6. Romantic Hearts Animation Loop ---
        function startHeartAnimation() {
            heartInterval = setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'romantic-heart';
                
                // Randomize heart styles for a natural look
                const heartsList = ['❤️', '💖', '💝', '💕'];
                heart.innerText = heartsList[Math.floor(Math.random() * heartsList.length)];
                
                heart.style.left = Math.random() * 100 + 'vw';
                // Random side drift amount for the CSS variable
                const drift = (Math.random() * 200 - 100) + 'px';
                heart.style.setProperty('--drift', drift);
                
                // Randomize speed slightly
                heart.style.animationDuration = (Math.random() * 2 + 3) + 's'; 

                winScreen.appendChild(heart);

                // Clean up heart element after it floats away
                setTimeout(() => {
                    heart.remove();
                }, 5000);
            }, 400); // Spawns a heart every 400ms
        }

        // --- 7. Dynamic Win Execution ---
        function triggerWin() {
            clearInterval(spawnInterval);
            clearInterval(powerupInterval);
            
            document.querySelectorAll('.target-item').forEach(el => el.remove());
            
            try { winAudio.play(); } catch(e){}

            // Randomly select her custom phrase
            const randomMsg = victoryMessages[Math.floor(Math.random() * victoryMessages.length)];
            victoryText.innerText = randomMsg;

            winScreen.classList.add('active');
            
            // Fire up the romantic background hearts
            startHeartAnimation();
        }

        // --- 8. Reset State ---
        function resetGame() {
            clearInterval(heartInterval);
            // Clean up any remaining floating hearts
            document.querySelectorAll('.romantic-heart').forEach(el => el.remove());

            score = 0;
            crampLevel = 100;
            isTimeFrozen = false;
            document.body.classList.remove('frozen');
            freezeBanner.style.display = 'none';
            scoreDisplay.innerText = score;
            crampDisplay.innerText = '100%';
            winScreen.classList.remove('active');
            startGame();
        }

        // Initiate App
        startGame();
    </script>
</body>
</html>
